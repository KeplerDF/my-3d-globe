<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Interactive Geological Globe</title>
  <style>
    body { margin: 0; background: #000; font-family: sans-serif; overflow: hidden; }
    #globeViz { width: 100vw; height: 100vh; }

    #controls {
      position: absolute;
      top: 20px;
      left: 20px;
      padding: 15px;
      background: rgba(0, 0, 0, 0.7);
      color: white;
      border-radius: 8px;
      border: 1px solid #444;
      z-index: 100;
    }

    #legend {
      position: absolute;
      bottom: 30px;
      right: 20px;
      padding: 15px;
      background: rgba(0, 0, 0, 0.85);
      color: white;
      border-radius: 10px;
      border: 1px solid #555;
      z-index: 100;
      min-width: 200px;
      pointer-events: none;
    }

    .legend-item { display: flex; align-items: center; margin-bottom: 6px; font-size: 13px; }
    .color-box { width: 14px; height: 14px; margin-right: 10px; border: 1px solid #fff; }
    button { cursor: pointer; padding: 8px 12px; background: #333; color: white; border: 1px solid #666; border-radius: 4px; margin-right: 5px; }
    button:hover { background: #555; }
  </style>
</head>
<body>

  <div id="controls">
    <h3>Globe View</h3>
    <button onclick="showTopo()">Satellite / Topo</button>
    <button onclick="showRocks()">Rock Types (Lithology)</button>
  </div>

  <div id="legend">
    <h4 id="legendTitle" style="margin:0 0 10px 0;">Elevation</h4>
    <div id="legendContent"></div>
  </div>

  <div id="globeViz"></div>

  <script src="https://cdn.jsdelivr.net/npm/globe.gl"></script>
<script>
  // 1. Setup Variables
  const imgTopo = 'https://unpkg.com/three-globe/example/img/earth-topology.png';
  const imgRocks = 'rock_map.png';

  const rockKey = [
    { color: '#FFD700', label: 'su: Unconsolidated Sediments' },
    { color: '#8B0000', label: 'vb: Basic Volcanic (Basalt)' },
    { color: '#FFA500', label: 'ss: Siliciclastic Sedimentary' },
    { color: '#00FF00', label: 'sc: Carbonate (Limestone)' },
    { color: '#FF00FF', label: 'pa: Acid Plutonic (Granite)' },
    { color: '#808080', label: 'mt: Metamorphic' },
    { color: '#0000FF', label: 'wb: Water Bodies' }
  ];

  let world; 

  function updateLegend(title, items) {
    const titleElem = document.getElementById('legendTitle');
    const container = document.getElementById('legendContent');
    if (!titleElem || !container) return;

    titleElem.innerText = title;
    container.innerHTML = items.map(item => `
      <div class="legend-item">
        <div class="color-box" style="background: ${item.color}"></div>
        <span>${item.label}</span>
      </div>
    `).join('');
  }

  // Define these globally so buttons can find them
  window.showTopo = function() {
    if (world) {
      world.globeImageUrl(imgTopo);
      updateLegend('Terrain View', [
        { color: '#228B22', label: 'Lowlands' },
        { color: '#A0522D', label: 'Mountains' },
        { color: '#FFFFFF', label: 'Ice / Snow' }
      ]);
    }
  };

  window.showRocks = function() {
    if (world) {
      world.globeImageUrl(imgRocks);
      updateLegend('Global Lithology (GLiM)', rockKey);
    }
  };

  window.onload = function() {
    world = Globe()(document.getElementById('globeViz'));

    // 1. Set the basic textures
    world.globeImageUrl(imgTopo);
    world.bumpImageUrl(imgTopo);
    
    // 2. The Fix: Use backgroundColor instead of baseColor
    // This sets the color of the sphere itself
    world.backgroundColor('#000000'); // Space is black
    
    // 3. Atmosphere settings (No RGBA to avoid Three.js warnings)
    world.showAtmosphere(true);
    world.atmosphereColor('#ffffff'); 
    world.atmosphereAltitude(0.12);

    // 4. Initialization
    const controls = world.controls();
    if (controls) {
        controls.autoRotate = true;
        controls.autoRotateSpeed = 0.5;
    }

    showTopo(); 
};
</script>
</body>
</html>
