<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>3D Globe Test</title>
  <style>
    body { margin: 0; background: #000; }
    #globeViz { width: 100vw; height: 100vh; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/globe.gl"></script>
</head>
<body>
  <div id="globeViz"></div>

  <script>
    // 1. Initialize the globe
    const myGlobe = Globe();

    // 2. Configure it
    myGlobe(document.getElementById('globeViz'))
      // Use a solid color first to see if it renders
      .globeColor('#333333') 
      // Use a reliable, standard Earth image
      .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg')
      .showAtmosphere(true)
      .atmosphereColor('lightskyblue');

    // 3. Add movement
    myGlobe.controls().autoRotate = true;
    myGlobe.controls().autoRotateSpeed = 0.5;

    console.log("Globe script finished loading!");
  </script>
</body>
</html>
