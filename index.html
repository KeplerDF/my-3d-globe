<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>3D Globe Test</title>
  <style>
    body { margin: 0; background: #000; }
    #globeViz { width: 100vw; height: 100vh; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/globe.gl"></script>
</head>
<body>
  <div id="globeViz"></div>

  <script>
  const world = Globe()
    (document.getElementById('globeViz'))
    // Try the "Guaranteed" link first to see it work
    .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-topology.png')
    .bumpImageUrl('https://unpkg.com/three-globe/example/img/earth-topology.png')
    .bumpAltitude(0.1)
    .showAtmosphere(true)
    .atmosphereColor('lightskyblue')
    .atmosphereAltitude(0.15);

  world.controls().autoRotate = true;
  world.controls().autoRotateSpeed = 0.5;

  // This helps you see in the "Console" if things are working
  console.log("The globe is attempting to load...");

  // Add the click listener
  world.onGlobeClick(({ lat, lng }) => {
      alert(`Latitude: ${lat}, Longitude: ${lng}`);
  });
</script>
</body>
</html>
