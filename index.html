<!DOCTYPE html>
<html>
<head>
  <style> body { margin: 0; background-color: #000; } </style>
  <script src="https://unpkg.com/globe.gl"></script>
</head>
<body>
  <div id="globeViz"></div>

  <script>
    const world = Globe()
      (document.getElementById('globeViz'))
      // Updated GEBCO link with explicit HTTPS and parameters
      .globeImageUrl('https://www.gebco.net/data_and_products/gebco_web_services/web_map_service/mapserv?request=getmap&service=wms&BBOX=-90,-180,90,180&crs=EPSG:4326&format=image/jpeg&layers=gebco_latest&width=1200&height=600')
      .backgroundColor('#000011')
      .showAtmosphere(true)
      .atmosphereColor('lightskyblue');
  </script>
</body>
</html>
