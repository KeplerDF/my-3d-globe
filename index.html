<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Topographic Globe</title>
  <style>
    body { margin: 0; overflow: hidden; background-color: #000; }
    #globeViz { width: 100vw; height: 100vh; }
  </style>
  <script src="https://unpkg.com/globe.gl"></script>
</head>
<body>

  <div id="globeViz"></div>

  <script>
    const world = Globe()
      (document.getElementById('globeViz'))
      // This looks for the image in the SAME folder as this HTML file
      .globeImageUrl('https://vasturiano.github.io/globe.gl/example/img/earth-topology.png')
      .backgroundColor('#000011')
      .showAtmosphere(true)
      .atmosphereColor('lightskyblue')
      .atmosphereAltitude(0.15);

    world.onGlobeClick(({ lat, lng }) => {
        alert(`You clicked at Latitude: ${lat}, Longitude: ${lng}`);
    });

    world.controls().autoRotate = true;
    world.controls().autoRotateSpeed = 0.5;
  </script>

</body>
</html>
