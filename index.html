<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Interactive Geological Globe</title>
  <style>
    /* 1. LAYOUT & THEME */
    body { margin: 0; background: #000; font-family: sans-serif; overflow: hidden; }
    #globeViz { width: 100vw; height: 100vh; }

    /* 2. CONTROLS (Top Left) */
    #controls {
      position: absolute;
      top: 20px;
      left: 20px;
      padding: 15px;
      background: rgba(0, 0, 0, 0.7);
      color: white;
      border-radius: 8px;
      border: 1px solid #444;
      z-index: 100;
    }
    #controls h3 { margin: 0 0 10px 0; font-size: 16px; }
    button {
      cursor: pointer;
      padding: 8px 12px;
      background: #333;
      color: white;
      border: 1px solid #666;
      border-radius: 4px;
      margin-right: 5px;
    }
    button:hover { background: #555; }

    /* 3. LEGEND (Bottom Right) */
    #legend {
      position: absolute;
      bottom: 30px;
      right: 20px;
      padding: 15px;
      background: rgba(0, 0, 0, 0.85);
      color: white;
      border-radius: 10px;
      border: 1px solid #555;
      z-index: 100;
      min-width: 200px;
      pointer-events: none; /* Allows interacting with globe behind legend */
    }
    #legend h4 { margin: 0 0 10px 0; border-bottom: 1px solid #444; padding-bottom: 5px; }
    .legend-item { display: flex; align-items: center; margin-bottom: 6px; font-size: 13px; }
    .color-box { width: 14px; height: 14px; margin-right: 10px; border: 1px solid #fff; flex-shrink: 0; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/globe.gl"></script>
</head>
<body>

  <div id="controls">
    <h3>Globe View</h3>
    <button onclick="showTopo()">Satellite / Topo</button>
    <button onclick="showRocks()">Rock Types (Lithology)</button>
  </div>

  <div id="legend">
    <h4 id="legendTitle">Elevation</h4>
    <div id="legendContent"></div>
  </div>

  <div id="globeViz"></div>

  <script>
    // --- CONFIGURATION ---
    const imgTopo = 'https://unpkg.com/three-globe/example/img/earth-topology.png';
    const imgRocks = 'rock_map.png';

    const rockKey = [
      { color: '#FFD700', label: 'su: Unconsolidated Sediments' },
      { color: '#8B0000', label: 'vb: Basic Volcanic (Basalt)' },
      { color: '#FFA500', label: 'ss: Siliciclastic Sedimentary' },
      { color: '#00FF00', label: 'sc: Carbonate (Limestone)' },
      { color: '#FF00FF', label: 'pa: Acid Plutonic (Granite)' },
      { color: '#808080', label: 'mt: Metamorphic' },
      { color: '#0000FF', label: 'wb: Water Bodies' }
    ];

    let world; // Global variable to hold the globe instance

    // --- CORE FUNCTIONS ---
    function updateLegend(title, items) {
      document.getElementById('legendTitle').innerText = title;
      const container = document.getElementById('legendContent');
      container.innerHTML = items.map(item => `
        <div class="legend-item">
          <div class="color-box" style="background: ${item.color}"></div>
          <span>${item.label}</span>
        </div>
      `).join('');
    }

    function showTopo() {
      if (!world) return;
      world.globeImageUrl(imgTopo).bumpImageUrl(imgTopo);
      updateLegend('Terrain View', [
        { color: '#228B22', label: 'Lowlands' },
        { color: '#A0522D', label: 'Mountains' },
        { color: '#FFFFFF', label: 'Ice / Snow' }
      ]);
    }

    function showRocks() {
      if (!world) return;
      world.globeImageUrl(imgRocks).bumpImageUrl(imgTopo);
      updateLegend('Global Lithology (GLiM)', rockKey);
    }

    // --- INITIALIZATION ---
    window.onload = function() {
      world = Globe()(document.getElementById('globeViz'))
        .globeImageUrl(imgTopo)
        .bumpImageUrl(imgTopo)
        .bumpAltitude(0.15)
        .baseColor('#000033')
        .showAtmosphere(true)
        .atmosphereColor('lightskyblue')
        .atmosphereAltitude(0.15);

      world.controls().autoRotate = true;
      world.controls().autoRotateSpeed = 0.5;

      // Set initial view
      showTopo();
    };
  </script>
</body>
</html>
