<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Interactive Geological Globe</title>
  <style>
    body { margin: 0; background: #000; font-family: sans-serif; }
    #globeViz { width: 100vw; height: 100vh; }
    
    /* This styles the toggle button UI */
    #controls {
      position: absolute;
      top: 20px;
      left: 20px;
      padding: 15px;
      background: rgba(0, 0, 0, 0.7);
      color: white;
      border-radius: 8px;
      border: 1px solid #444;
      z-index: 10;
    }
    button {
      cursor: pointer;
      padding: 8px 12px;
      background: #333;
      color: white;
      border: 1px solid #666;
      border-radius: 4px;
    }
    button:hover { background: #555; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/globe.gl"></script>
</head>
<body>

  <div id="controls">
    <h3>Globe View</h3>
    <button onclick="showTopo()">Satellite / Topo</button>
    <button onclick="showRocks()">Rock Types (Lithology)</button>
  </div>

  <div id="globeViz"></div>

  <script>
  // 1. Define your image URLs first
  const imgTopo = 'https://unpkg.com/three-globe/example/img/earth-topology.png';
  // Verified fallback for rocks until you upload your own
  const imgRocks = 'https://unpkg.com/three-globe/example/img/earth-night.jpg';

  // 2. Initialize the globe correctly
  // Note: We use .globeImageUrl and .bumpImageUrl as separate calls
  const world = Globe()(document.getElementById('globeViz'))
    .globeImageUrl(imgTopo)
    .bumpImageUrl(imgTopo)
    .bumpAltitude(0.15)
    .showAtmosphere(true)
    .atmosphereColor('lightskyblue')
    .atmosphereAltitude(0.15);

  // 3. Set properties that don't need to be chained
  world.controls().autoRotate = true;
  world.controls().autoRotateSpeed = 0.5;

  // 4. These functions now wait until world is defined
  function showTopo() {
    console.log("Switching to Topo...");
    world.globeImageUrl(imgTopo);
    world.bumpImageUrl(imgTopo);
  }

  function showRocks() {
    console.log("Switching to Rocks...");
    // If you have a local file named 'rock_map.jpg', change this line to:
    // world.globeImageUrl('rock_map.jpg');
    world.globeImageUrl(imgRocks);
    
    // We keep the topo bump so the rocks look 3D!
    world.bumpImageUrl(imgTopo); 
  }
</script>
</body>
</html>
